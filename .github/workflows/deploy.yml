name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Regenerate public/app-data.json from map-data
        run: node scripts/merge-json.js

      - name: Regenerate public/app-data-fr.json from map-data
        run: node scripts/merge-json-fr.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Ensure index.html exists (hub)
        run: test -f public/index.html

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
